#spring.application.name=OnboardIO
# ===============================
# Application
# ===============================
spring.application.name=onboardio-platform
server.port=8080

# Server base URL (used for generating file URLs)
server.base-url=http://localhost:8080

# ===============================
# Database (H2 - Dev)
# ===============================
spring.datasource.url=jdbc:h2:mem:onboardingdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ===============================
# JWT Configuration
# ===============================
jwt.secret=onboarding-secret-key-very-secure-1234567890
jwt.expiration-ms=86400000

# ===============================
# Google OAuth2 Configuration
# ===============================
# To get your credentials:
# 1. Go to: https://console.cloud.google.com/
# 2. Create a new project or select existing
# 3. Enable Google+ API
# 4. Go to Credentials > Create Credentials > OAuth 2.0 Client ID
# 5. Set Authorized redirect URIs: http://localhost:8080/login/oauth2/code/google
# 6. Copy Client ID and Client Secret below

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# ===============================
# Swagger / OpenAPI
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ===============================
# Logging (Optional but Helpful)
# ===============================
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# CORS (Handled via Config Class)
# ===============================
# No properties needed here

# ===============================
# File Storage Configuration
# ===============================
# Options: LOCAL (default), AWS_S3, FIREBASE
storage.type=LOCAL
storage.local.path=uploads
# File size limits (in bytes)
storage.local.min-size=5120      
# 5 KB minimum
storage.local.max-size=20971520 
# 20 MB maximum

# AWS S3 Configuration (optional - for production)
# storage.type=AWS_S3
# aws.s3.bucket-name=your-bucket-name
# aws.s3.region=us-east-1
# aws.s3.access-key=your-access-key
# aws.s3.secret-key=your-secret-key

# Firebase Configuration (optional - alternative cloud storage)
# storage.type=FIREBASE
# firebase.storage-bucket=your-project.appspot.com

# Multipart file upload configuration
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ===============================
# Actuator (Optional - Disabled)
# ===============================
management.endpoints.web.exposure.include=health,info
